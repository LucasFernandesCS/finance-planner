name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: family
          POSTGRES_PASSWORD: family
          POSTGRES_DB: family_dreams
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U family -d family_dreams"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://family:family@localhost:5432/family_dreams
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      CPF_HASH_SECRET: ci-cpf-hash-secret
      REFRESH_TOKEN_HASH_SECRET: ci-refresh-token-hash-secret
      REFRESH_TOKEN_EXPIRES_IN_MINUTES: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @finance-planner/api db:generate

      - name: Run database migrations
        run: pnpm --filter @finance-planner/api db:deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
