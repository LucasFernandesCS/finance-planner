services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: family
      POSTGRES_PASSWORD: family
      POSTGRES_DB: family_dreams
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family -d family_dreams"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
